apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "openmrs-tenant.backend.fullname" . }}
  labels:
    {{- include "openmrs-tenant.backend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.backend.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "openmrs-tenant.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/backend-configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/backend-secret.yaml") . | sha256sum }}
        {{- with .Values.backend.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "openmrs-tenant.backend.labels" . | nindent 8 }}
        {{- with .Values.backend.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "openmrs-tenant.backend.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.backend.podSecurityContext | nindent 8 }}
      initContainers:
        - name: db-init
          image: mariadb:10.11
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              DB_HOST="{{ .Values.shared.db.hostname }}"
              DB_PORT={{ .Values.shared.db.port }}
              DB_NAME='{{ .Values.backend.db.database | replace "'" "'\\''" }}'
              DB_USER='{{ .Values.backend.db.user | replace "'" "'\\''" }}'
              DB_PASS='{{ .Values.backend.db.password | replace "'" "'\\''" }}'
              DB_MAX_CONN={{ .Values.backend.db.maxConnections }}

              SQL_PASS=$(sed "s/'/''/g" <<< "$DB_PASS")

              echo "Waiting for MariaDB at ${DB_HOST}:${DB_PORT}..."
              MAX_RETRIES=30; RETRY_INTERVAL=5; i=0
              until mariadb \
                -h "${DB_HOST}" -P "${DB_PORT}" -u root \
                -p"${MARIADB_ROOT_PASSWORD}" --ssl=0 \
                -e "SELECT 1;" 2>/dev/null; do
                i=$((i + 1))
                if [ $i -ge $MAX_RETRIES ]; then
                  echo "Timeout waiting for MariaDB after $((MAX_RETRIES * RETRY_INTERVAL)) seconds."
                  exit 1
                fi
                echo "  MariaDB not ready yet (attempt $i/$MAX_RETRIES)..."
                sleep $RETRY_INTERVAL
              done
              echo "MariaDB is reachable. Running bootstrap SQL..."

              mariadb \
                -h "${DB_HOST}" -P "${DB_PORT}" -u root \
                -p"${MARIADB_ROOT_PASSWORD}" --ssl=0 \
                -e "
                  CREATE DATABASE IF NOT EXISTS \`${DB_NAME}\`
                    CHARACTER SET utf8mb4 COLLATE utf8mb4_general_ci;
                  CREATE USER IF NOT EXISTS '${DB_USER}'@'%'
                    IDENTIFIED BY '${SQL_PASS}';
                  GRANT ALL PRIVILEGES ON \`${DB_NAME}\`.*
                    TO '${DB_USER}'@'%';
                  ALTER USER '${DB_USER}'@'%'
                    WITH MAX_USER_CONNECTIONS ${DB_MAX_CONN};
                  FLUSH PRIVILEGES;
                "
              echo "Database '${DB_NAME}' and user '${DB_USER}' are ready."
          env:
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "openmrs-tenant.backend.fullname" . }}-db-root
                  key: password
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.backend.securityContext | nindent 12 }}
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.service.port }}
              protocol: TCP
            {{- if .Values.backend.infinispan.clustered }}
            - name: infinispan-hibernate
              containerPort: {{ .Values.backend.infinispan.bind_port }}
              protocol: TCP
            - name: infinispan-api
              containerPort: {{ add .Values.backend.infinispan.bind_port 1 }}
              protocol: TCP
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.backend.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.backend.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.backend.startupProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "openmrs-tenant.backend.fullname" . }}
            - secretRef:
                name: {{ include "openmrs-tenant.backend.fullname" . }}
          volumeMounts:
            - name: data
              mountPath: /openmrs/data
      {{- if not .Values.backend.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.backend.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        {{- with .Values.backend.persistence.storageClass | default .Values.global.defaultStorageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.backend.persistence.size | quote }}
  {{- end }}
